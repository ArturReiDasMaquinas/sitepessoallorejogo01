<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplatArchives | The Unofficial Bible</title>
    <style>
        /* [Seus estilos base de fonte e body permanecem os mesmos] */
        @font-face {
            font-family: 'SplatoonFont';
            src: url('SplatoonFont.otf') format('opentype');
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            scroll-snap-type: y mandatory;
            overflow-x: hidden;
        }

        section {
            width: 100vw; height: 100vh;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            scroll-snap-align: start;
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .lore-box {
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px; max-width: 1100px; width: 85%;
            max-height: 85vh; overflow-y: auto; border-radius: 30px;
        }

        /* --- NOVO PAINEL DE ÁUDIO --- */
        #audio-dashboard {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #eaff00;
            border-radius: 20px;
            padding: 15px;
            width: 250px;
            font-family: 'SplatoonFont', sans-serif;
            color: #eaff00;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .audio-title { font-size: 0.8rem; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #eaff00; padding-bottom: 5px; }
        
        .mode-switch {
            display: flex; justify-content: space-around; margin-bottom: 15px;
        }

        .mode-btn {
            background: #222; border: 1px solid #eaff00; color: #eaff00;
            padding: 5px 10px; cursor: pointer; font-size: 0.7rem; border-radius: 5px;
        }

        .mode-btn.active { background: #eaff00; color: #000; }

        .jukebox-controls { display: none; flex-direction: column; gap: 10px; }
        .jukebox-controls.show { display: flex; }

        select {
            background: #000; color: #eaff00; border: 1px solid #eaff00;
            padding: 5px; border-radius: 5px; font-family: sans-serif;
        }

        #track-info { font-size: 0.65rem; margin-top: 10px; color: #fff; text-align: center; }

        /* Estilos das bordas das seções */
        .border-s1 { border-left: 15px solid #00bcd4; }
        .border-s2 { border-left: 15px solid #ff0077; }
        .border-octo { border-left: 15px solid #00f2ff; }
        .border-s3 { border-left: 15px solid #eaff00; }
    </style>
</head>
<body>

    <div id="audio-dashboard">
        <div class="audio-title">SPLAT-AUDIO SYSTEM</div>
        
        <div class="mode-switch">
            <button id="btn-auto" class="mode-btn active" onclick="setMode('auto')">AUTO (JOGO)</button>
            <button id="btn-manual" class="mode-btn" onclick="setMode('manual')">MANUAL</button>
        </div>

        <div id="jukebox" class="jukebox-controls">
            <select id="track-selector" onchange="manualPlay()">
                <option value="splat1.mp3">Splatoon 1 - Main Theme</option>
                <option value="splat2.mp3">Splatoon 2 - Inkopolis</option>
                <option value="splat2dlc.mp3">Octo Expansion - Metro</option>
                <option value="splat3.mp3">Splatoon 3 - Anarchy</option>
                <option value="splat3dlc.mp3">Side Order - Lore</option>
            </select>
        </div>

        <div id="track-info">MODO: AUTOMÁTICO</div>
    </div>

    <audio id="main-audio" loop></audio>

    <section id="sec1" data-audio="splat1.mp3" style="background-image: url('squidsisters.png');">
        <div class="lore-box border-s1">
            <h1>Prólogo: O Legado</h1>
            <p>Há 12.000 anos, o mundo mudou...</p>
        </div>
    </section>

    <section id="sec2" data-audio="splat2.mp3" style="background-image: url('offthehook.png');">
        <div class="lore-box border-s2">
            <h1>Splatoon 2: Sombras</h1>
            <p>O retorno de Octavio e o desaparecimento de Callie.</p>
        </div>
    </section>

    <section id="sec3" data-audio="splat2dlc.mp3" style="background-image: url('agent8.png');">
        <div class="lore-box border-octo">
            <h1>Octo Expansion: Sanitização</h1>
            <p>O terrível plano do Comandante Tartar.</p>
        </div>
    </section>

    <section id="sec4" data-audio="splat3.mp3" style="background-image: url('deepcut.png');">
        <div class="lore-box border-s3">
            <h1>Splatoon 3: Mr. Grizz</h1>
            <p>O último sobrevivente da Ark Polaris.</p>
        </div>
    </section>

    <script>
        const audio = document.getElementById('main-audio');
        const info = document.getElementById('track-info');
        const jukebox = document.getElementById('jukebox');
        const selector = document.getElementById('track-selector');
        
        let audioMode = 'auto'; // 'auto' ou 'manual'
        let currentAutoTrack = "";

        // Troca de Modo
        function setMode(mode) {
            audioMode = mode;
            document.getElementById('btn-auto').classList.toggle('active', mode === 'auto');
            document.getElementById('btn-manual').classList.toggle('active', mode === 'manual');
            
            if (mode === 'manual') {
                jukebox.classList.add('show');
                manualPlay();
            } else {
                jukebox.classList.remove('show');
                info.innerText = "MODO: AUTOMÁTICO";
                currentAutoTrack = ""; // Reseta para forçar a detecção da seção atual
            }
        }

        // Play Manual (Jukebox)
        function manualPlay() {
            const track = selector.value;
            if (audio.src.includes(track)) return;
            audio.src = track;
            audio.play();
            info.innerText = "TOCANDO AGORA: " + track;
        }

        // Play Automático (Baseado na Seção)
        const observer = new IntersectionObserver((entries) => {
            if (audioMode !== 'auto') return;

            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const track = entry.target.getAttribute('data-audio');
                    if (track && track !== currentAutoTrack) {
                        currentAutoTrack = track;
                        audio.src = track;
                        audio.play().catch(() => {
                            info.innerText = "CLIQUE PARA ATIVAR O SOM";
                        });
                        info.innerText = "MODO AUTO: " + track;
                    }
                }
            });
        }, { threshold: 0.6 });

        document.querySelectorAll('section').forEach(s => observer.observe(s));

        // Start no primeiro clique
        window.addEventListener('click', () => {
            if (audio.paused) { audio.play().catch(e => {}); }
        }, { once: true });
    </script>
</body>
</html>
